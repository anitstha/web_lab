<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 3 - Styled Form Validation</title>
    <style>
        body {
            font: 14px 'Segoe UI', sans-serif;
            background: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .form-container {
            background: #fff;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            width: 320px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 5px;
            color: #555;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
        }

        input:focus {
            outline: none;
            border-color: #4A90E2;
        }

        .checkbox-group {
            background: #f9f9f9;
            padding: 10px;
            border-radius: 6px;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            font-size: 0.9em;
            margin-bottom: 5px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #4A90E2;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #357ABD;
        }

        #errorMsg {
            color: #e74c3c;
            font-size: 12px;
            text-align: center;
            margin-top: 10px;
            min-height: 1.2em;
        }
    </style>
</head>

<body>

    <div class="form-container">
        <h2>Join Us Today...</h2>
        <form id="registrationForm" onsubmit="return validateForm()">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Min. 4 characters">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="e.g. 1Abc#">
            </div>

            <div class="form-group">
                <label>Education Level</label>
                <div class="checkbox-group">
                    <label class="checkbox-item">
                        <input type="checkbox" name="education" value="High School"> High School
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" name="education" value="Undergraduate"> Undergraduate
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" name="education" value="Postgraduate"> Postgraduate
                    </label>
                </div>
            </div>

            <button type="submit">Register</button>
            <div id="errorMsg"></div>
        </form>
    </div>

    <script>
        function validateForm() {
            const username = document.getElementById("username").value;
            const password = document.getElementById("password").value;
            const checkboxes = document.querySelectorAll('input[name="education"]:checked');
            const errorMsg = document.getElementById("errorMsg");

            // Clear previous errors
            errorMsg.innerHTML = "";

            // Rule 1: All fields required
            if (!username || !password || checkboxes.length === 0) {
                errorMsg.innerHTML = "Error: All fields are required.";
                return false;
            }

            // Rule 2: Username length (at least 4)
            if (username.length < 4) {
                errorMsg.innerHTML = "Username must be at least 4 characters";
                return false;
            }

            // Rule 3: Password start with digit, end with #
            const passRegex = /^\d.*#$/;
            if (!passRegex.test(password)) {
                errorMsg.innerHTML = "Error: Password must start with a digit and end with #.";
                return false;
            }

            alert("Validation successful!");
            return true;
        }
    </script>

</body>

</html>
