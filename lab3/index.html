<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Validation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="form-container">
        <h2>User Registration</h2>
        <form id="registrationForm" onsubmit="return validateForm(event)">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter username (min 4 chars)">
                <span class="error" id="usernameError"></span>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder=" Must start with digit, end with #">
                <span class="error" id="passwordError"></span>
            </div>

            <div class="form-group">
                <label>Education</label>
                <div class="checkbox-group">
                    <label class="checkbox-label">
                        <input type="checkbox" name="education" value="highschool">
                        High School
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" name="education" value="bachelors">
                        Bachelor's Degree
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" name="education" value="masters">
                        Master's Degree
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" name="education" value="phd">
                        PhD
                    </label>
                </div>
                <span class="error" id="educationError"></span>
            </div>

            <button type="submit" class="submit-btn">Submit</button>
            <span class="success" id="successMessage"></span>
        </form>
    </div>

    <script>
        function validateForm(event) {
            event.preventDefault();
            
            let isValid = true;
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const educationCheckboxes = document.querySelectorAll('input[name="education"]:checked');
            
            document.getElementById('usernameError').textContent = '';
            document.getElementById('passwordError').textContent = '';
            document.getElementById('educationError').textContent = '';
            document.getElementById('successMessage').textContent = '';
            
            if (!username) {
                document.getElementById('usernameError').textContent = 'Username is required';
                isValid = false;
            } else if (username.length < 4) {
                document.getElementById('usernameError').textContent = 'Username must be at least 4 characters';
                isValid = false;
            }
            
            if (!password) {
                document.getElementById('passwordError').textContent = 'Password is required';
                isValid = false;
            } else {
                const firstChar = password.charAt(0);
                const lastChar = password.charAt(password.length - 1);
                
                if (!/^\d/.test(password)) {
                    document.getElementById('passwordError').textContent = 'Password must start with a digit';
                    isValid = false;
                } else if (lastChar !== '#') {
                    document.getElementById('passwordError').textContent = 'Password must end with #';
                    isValid = false;
                }
            }
            
            if (educationCheckboxes.length === 0) {
                document.getElementById('educationError').textContent = 'Select at least one education field';
                isValid = false;
            }
            
            if (isValid) {
                document.getElementById('successMessage').textContent = 'Form submitted successfully!';
                document.getElementById('registrationForm').reset();
            }
            
            return false;
        }
    </script>
</body>
</html>
