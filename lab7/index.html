<!DOCTYPE html>
<html>
<head>
    <title>Lab 7 - CSS Stylesheets</title>

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Internal CSS -->
    <style>
        h2 {
            color: darkgreen;
            font-family: Georgia;
        }

        .box {
            background-color: rgba(240, 237, 237, 0.781);
            padding: 10px;
        }
    </style>
</head>

<body>

    <h1>CSS Stylesheet Demo</h1>

    <!-- Inline CSS -->
    <p style="color: red; font-weight: bold;">
        This paragraph uses Inline CSS.
    </p>

    <h2>Internal CSS Example</h2>
    <div class="box">
        This box uses Internal CSS styling.
    </div>

    <h3>External CSS Example</h3>
    <p>
        This paragraph uses External CSS (font-style italic).
    </p>

    <h2>Link Styles</h2>
    <a href="#">Click Me</a>

</body>
</html>
