<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 1 - Basic HTML Page Layout</title>
    <!-- Link to external CSS file -->
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <!-- Header Section -->
    <header>
        <h1>My News Portal</h1>
    </header>

    <!-- Main Content Section -->
    <main>
        <!-- Welcome Message -->
        <section class="welcome">
            <h2>Welcome!</h2>
            <p>Welcome to our news portal. Stay updated with the latest news from around the world.</p>
        </section>

        <!-- News List with External Links -->
        <section class="news-list">
            <h3>Latest News</h3>
            <ul>
                <li><a href="https://www.bbc.com/news" target="_blank">BBC News</a></li>
                <li><a href="https://www.cnn.com" target="_blank">CNN</a></li>
                <li><a href="https://www.kantipur.com" target="_blank">Kantipur</a></li>
            </ul>
        </section>
    </main>

    <!-- Footer Section -->
    <footer>
        <p>&copy; 2026 My News Portal. All rights reserved.</p>
    </footer>
</body>

</html>
